[package]
name        = "gemma_bench"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish     = false
description = "Local-only performance harness for Gemma 4 through vLLM. Not run in CI."

[features]
default = []
# Mirrors the rollup feature so `cargo run -p gemma_bench --features
# gemma-default` brings in the vLLM bridge + perf knobs.
gemma-default = ["atomr-infer/gemma-default", "atomr-infer-runtime-vllm/gemma-default"]

[dependencies]
atomr-infer              = { workspace = true }
atomr-infer-core         = { workspace = true }
atomr-infer-runtime-vllm = { workspace = true }

clap               = { workspace = true }
tokio              = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
futures            = { workspace = true }
anyhow             = { workspace = true }

[[bin]]
name             = "gemma_bench"
path             = "src/main.rs"
required-features = ["gemma-default"]
