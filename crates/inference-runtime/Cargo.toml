[package]
name                   = "rakka-inference-runtime"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true
keywords.workspace     = true
categories.workspace   = true
readme                 = "README.md"
documentation          = "https://docs.rs/rakka-inference-runtime"
description            = "Runtime-agnostic actor topology for rakka-inference — gateway, request actor, dp-coordinator, engine-core, two-tier worker, placement, deployment manager, metrics."

[lib]
name = "inference_runtime"

[features]
default = []
# Pulls in rakka-accel for the local-GPU two-tier supervision pattern
# and the per-actor stream allocator. Off by default so a pure-remote
# inference build (`inference --features remote-only`) compiles no
# GPU dependencies whatsoever.
local-gpu = ["dep:rakka-accel", "rakka-accel/cuda"]

[dependencies]
inference-core = { workspace = true }

# Rakka actor primitives — the umbrella `rakka` crate is intentionally
# not depended on (we use the sub-crates directly so this crate
# publishes to crates.io independent of the umbrella's release cadence).
rakka-core             = { workspace = true }
rakka-config           = { workspace = true }
rakka-cluster-tools    = { workspace = true }
rakka-distributed-data = { workspace = true }

# rakka-accel is the upstream substrate for two-tier supervision and
# GPU dispatch. Optional — only present when the `local-gpu` feature
# is enabled (see §10.5 / R7 of the doc-redesign delta).
rakka-accel = { workspace = true, optional = true }

# HTTP gateway
axum     = { workspace = true }
tower    = { workspace = true }

# Async / errors
tokio       = { workspace = true }
async-trait = { workspace = true }
chrono      = { version = "0.4", default-features = false, features = ["clock"] }
futures     = { workspace = true }
parking_lot = { workspace = true }
arc-swap    = { workspace = true }
tracing     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
url         = { workspace = true }
bytes       = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
