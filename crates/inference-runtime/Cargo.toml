[package]
name = "atomr-infer-runtime"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true
keywords.workspace     = true
categories.workspace   = true
readme                 = "README.md"
documentation          = "https://docs.rs/atomr-infer-runtime"
description            = "Runtime-agnostic actor topology for atomr-infer — gateway, request actor, dp-coordinator, engine-core, two-tier worker, placement, deployment manager, metrics."

[lib]
name = "atomr_infer_runtime"

[features]
default = []
# Pulls in atomr-accel for the local-GPU two-tier supervision pattern
# and the per-actor stream allocator. Off by default so a pure-remote
# inference build (`atomr-infer --features remote-only`) compiles no
# GPU dependencies whatsoever.
local-gpu = ["dep:atomr-accel", "atomr-accel/cuda"]

[dependencies]
atomr-infer-core = { workspace = true }

# atomr actor primitives. Imported directly without the umbrella so
# this crate stays in sync with atomr's per-crate release cadence.
atomr-core             = { workspace = true }
atomr-config           = { workspace = true }
atomr-cluster-tools    = { workspace = true }
atomr-distributed-data = { workspace = true }

# atomr-accel is the upstream substrate for two-tier supervision and
# GPU dispatch. Optional — only present when the `local-gpu` feature
# is enabled.
atomr-accel = { workspace = true, optional = true }

# HTTP gateway
axum     = { workspace = true }
tower    = { workspace = true }

# Async / errors
tokio       = { workspace = true }
async-trait = { workspace = true }
chrono      = { version = "0.4", default-features = false, features = ["clock"] }
futures     = { workspace = true }
parking_lot = { workspace = true }
arc-swap    = { workspace = true }
tracing     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
url         = { workspace = true }
bytes       = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
