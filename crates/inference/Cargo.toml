[package]
name = "atomr-infer"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
authors.workspace      = true
keywords.workspace     = true
categories.workspace   = true
readme                 = "../../README.md"
documentation          = "https://docs.rs/atomr-infer"
description            = "Multi-runtime GPU + remote inference as a supervised actor system on atomr. Single-crate rollup that re-exports per-runtime backends behind feature flags."

[features]
default = []

# Local runtimes
vllm      = ["dep:atomr-infer-runtime-vllm",      "atomr-infer-runtime-vllm/vllm"]
# Zero-config local Gemma 4 on top of the vllm runner. Auto-probes
# GPU + Python + vLLM + HF token at boot; provisions a `gemma-local`
# deployment when ready. Off by default — operators running production
# don't want a surprise model download.
gemma-default = ["vllm", "atomr-infer-runtime-vllm/gemma-default"]
tensorrt  = ["dep:atomr-infer-runtime-tensorrt",  "atomr-infer-runtime-tensorrt/tensorrt"]
ort       = ["dep:atomr-infer-runtime-ort",       "atomr-infer-runtime-ort/ort"]
candle    = ["dep:atomr-infer-runtime-candle",    "atomr-infer-runtime-candle/candle", "accel"]
cudarc    = ["dep:atomr-infer-runtime-cudarc",    "atomr-infer-runtime-cudarc/cudarc", "accel"]
mistralrs = ["dep:atomr-infer-runtime-mistralrs", "atomr-infer-runtime-mistralrs/mistralrs"]

# Forwarded TensorRT sub-features (atomr-accel Phase 8). Each implies
# `tensorrt`. `tensorrt-link` only flips on the libnvinfer link probe;
# without it the runner compiles + unit-tests on hosts without TensorRT.
tensorrt-onnx   = ["tensorrt", "atomr-infer-runtime-tensorrt/tensorrt-onnx"]
tensorrt-int8   = ["tensorrt", "atomr-infer-runtime-tensorrt/tensorrt-int8"]
tensorrt-fp8    = ["tensorrt", "atomr-infer-runtime-tensorrt/tensorrt-fp8"]
tensorrt-plugin = ["tensorrt", "atomr-infer-runtime-tensorrt/tensorrt-plugin"]
tensorrt-link   = ["tensorrt", "atomr-infer-runtime-tensorrt/tensorrt-link"]

# Forwarded ORT sub-features. `ort-cuda` enables the CUDA execution
# provider; `ort-load-dynamic` lets `libonnxruntime` be located at
# runtime via `ORT_DYLIB_PATH`; `ort-hf-hub` adds the optional
# `tokenizer.json` download path. None are in `all-native` — link-
# affecting features stay opt-in (matches the `tensorrt-link`
# precedent).
ort-cuda         = ["ort", "atomr-infer-runtime-ort/ort-cuda"]
ort-load-dynamic = ["ort", "atomr-infer-runtime-ort/ort-load-dynamic"]
ort-hf-hub       = ["ort", "atomr-infer-runtime-ort/ort-hf-hub"]

# Remote runtimes (no system deps; safe to enable on any host)
openai    = ["dep:atomr-infer-runtime-openai"]
anthropic = ["dep:atomr-infer-runtime-anthropic"]
gemini    = ["dep:atomr-infer-runtime-gemini"]
litellm   = ["dep:atomr-infer-runtime-litellm", "openai"]

# Audio modality — TTS providers (M4, M6, M7, M9-A, M9-B, M10).
# Each enables the matching `inference-runtime-*` crate. The `*-openai`
# variants additionally pull in the shared `openai` rollup (config /
# bearer / retry classification reuse).
tts-piper           = ["dep:atomr-infer-runtime-piper", "atomr-infer-runtime-piper/piper"]
tts-piper-cuda      = ["tts-piper", "atomr-infer-runtime-piper/piper-cuda"]
tts-piper-load-dynamic = ["tts-piper", "atomr-infer-runtime-piper/piper-load-dynamic"]
tts-openai          = ["dep:atomr-infer-runtime-openai-tts", "atomr-infer-runtime-openai-tts/tts-openai", "openai"]
tts-openai-realtime = ["dep:atomr-infer-runtime-openai-realtime", "atomr-infer-runtime-openai-realtime/tts-openai-realtime", "openai"]
tts-elevenlabs      = ["dep:atomr-infer-runtime-elevenlabs", "atomr-infer-runtime-elevenlabs/tts-elevenlabs"]
tts-gemini-live     = ["dep:atomr-infer-runtime-gemini-live", "atomr-infer-runtime-gemini-live/tts-gemini-live", "gemini"]
tts-kokoro          = ["dep:atomr-infer-runtime-kokoro", "atomr-infer-runtime-kokoro/tts-kokoro"]
tts-kokoro-cuda     = ["tts-kokoro", "atomr-infer-runtime-kokoro/tts-kokoro-cuda"]
tts-kokoro-load-dynamic = ["tts-kokoro", "atomr-infer-runtime-kokoro/tts-kokoro-load-dynamic"]
tts-xtts            = ["dep:atomr-infer-runtime-xtts", "atomr-infer-runtime-xtts/tts-xtts"]
tts-xtts-cuda       = ["tts-xtts", "atomr-infer-runtime-xtts/tts-xtts-cuda"]
tts-xtts-load-dynamic = ["tts-xtts", "atomr-infer-runtime-xtts/tts-xtts-load-dynamic"]
tts-moss            = ["dep:atomr-infer-runtime-moss", "atomr-infer-runtime-moss/tts-moss"]

# Audio modality — STT providers (M5, M6, M8).
stt-whisper         = ["dep:atomr-infer-runtime-whisper-local", "atomr-infer-runtime-whisper-local/stt-whisper"]
stt-whisper-cuda    = ["stt-whisper", "atomr-infer-runtime-whisper-local/stt-whisper-cuda"]
stt-whisper-metal   = ["stt-whisper", "atomr-infer-runtime-whisper-local/stt-whisper-metal"]
stt-whisper-coreml  = ["stt-whisper", "atomr-infer-runtime-whisper-local/stt-whisper-coreml"]
stt-whisper-vulkan  = ["stt-whisper", "atomr-infer-runtime-whisper-local/stt-whisper-vulkan"]
stt-whisper-openblas = ["stt-whisper", "atomr-infer-runtime-whisper-local/stt-whisper-openblas"]
stt-openai          = ["dep:atomr-infer-runtime-openai-stt", "atomr-infer-runtime-openai-stt/stt-openai", "openai"]
stt-deepgram        = ["dep:atomr-infer-runtime-deepgram", "atomr-infer-runtime-deepgram/stt-deepgram"]
stt-assemblyai      = ["dep:atomr-infer-runtime-assemblyai", "atomr-infer-runtime-assemblyai/stt-assemblyai"]

# Audio modality — Audio2Face (M11). Hard arch gate (Linux x86_64);
# kept out of `all-native` / `all-remote` aggregates for that reason.
audio2face          = ["dep:atomr-infer-runtime-audio2face", "atomr-infer-runtime-audio2face/audio2face"]

# Audio meta-aggregates.
tts-remote-all = ["tts-openai", "tts-openai-realtime", "tts-elevenlabs", "tts-gemini-live"]
tts-local-all  = ["tts-piper", "tts-kokoro", "tts-xtts", "tts-moss"]
tts-all        = ["tts-remote-all", "tts-local-all"]
stt-remote-all = ["stt-openai", "stt-deepgram", "stt-assemblyai"]
stt-local-all  = ["stt-whisper"]
stt-all        = ["stt-remote-all", "stt-local-all"]
audio-all      = ["tts-all", "stt-all", "audio2face"]

# Cross-cutting
pipeline      = ["dep:atomr-infer-pipeline"]
testkit       = ["dep:atomr-infer-testkit"]
# Pulls in the atomr-accel trait surface, the NVIDIA CUDA backend
# (atomr-accel-cuda — split out of the umbrella in atomr-accel 0.3),
# and wires the runtime's two-tier supervision pattern. The
# atomr-accel-patterns blueprints layer on via `accel-patterns`. Both
# are implied by `candle` / `cudarc`. Off by default — `remote-only`
# builds skip these and therefore compile no GPU deps at all.
accel          = ["dep:atomr-accel", "dep:atomr-accel-cuda", "atomr-infer-runtime/local-gpu"]
accel-patterns = ["dep:atomr-accel-patterns", "pipeline", "atomr-infer-pipeline/cuda-patterns"]

# Aggregates per doc §10.5
all-native      = ["tensorrt", "ort", "candle", "cudarc", "mistralrs", "tts-local-all", "stt-local-all"]
all-python      = ["vllm"]
all-local       = ["all-native", "all-python"]
all-remote      = ["openai", "anthropic", "gemini", "litellm", "tts-remote-all", "stt-remote-all"]
# `audio2face` is the only feature with a hard CPU-arch gate (Linux
# x86_64). Keep it out of `all-runtimes` so the workspace-wide aggregate
# still builds on aarch64 / macOS dev hosts.
all-runtimes    = ["all-local", "all-remote", "accel-patterns"]
default-prod    = ["vllm", "tensorrt", "ort", "openai", "anthropic", "pipeline"]
# remote-only deliberately excludes `accel` / `accel-patterns` so the
# resulting binary pulls no GPU deps whatsoever.
remote-only     = ["all-remote", "pipeline"]

[dependencies]
atomr-infer-core    = { workspace = true }
atomr-infer-runtime = { workspace = true }

atomr-infer-runtime-vllm      = { workspace = true, optional = true }
atomr-infer-runtime-tensorrt  = { workspace = true, optional = true }
atomr-infer-runtime-ort       = { workspace = true, optional = true }
atomr-infer-runtime-candle    = { workspace = true, optional = true }
atomr-infer-runtime-cudarc    = { workspace = true, optional = true }
atomr-infer-runtime-mistralrs = { workspace = true, optional = true }

atomr-infer-runtime-openai    = { workspace = true, optional = true }
atomr-infer-runtime-anthropic = { workspace = true, optional = true }
atomr-infer-runtime-gemini    = { workspace = true, optional = true }
atomr-infer-runtime-litellm   = { workspace = true, optional = true }

# Audio modality crates — all optional, gated on the matching feature flag.
atomr-infer-runtime-piper             = { workspace = true, optional = true }
atomr-infer-runtime-whisper-local     = { workspace = true, optional = true }
atomr-infer-runtime-openai-tts        = { workspace = true, optional = true }
atomr-infer-runtime-openai-stt        = { workspace = true, optional = true }
atomr-infer-runtime-openai-realtime   = { workspace = true, optional = true }
atomr-infer-runtime-elevenlabs        = { workspace = true, optional = true }
atomr-infer-runtime-deepgram          = { workspace = true, optional = true }
atomr-infer-runtime-assemblyai        = { workspace = true, optional = true }
atomr-infer-runtime-gemini-live       = { workspace = true, optional = true }
atomr-infer-runtime-kokoro            = { workspace = true, optional = true }
atomr-infer-runtime-xtts              = { workspace = true, optional = true }
atomr-infer-runtime-moss              = { workspace = true, optional = true }
atomr-infer-runtime-audio2face        = { workspace = true, optional = true }

atomr-infer-pipeline          = { workspace = true, optional = true }
atomr-infer-testkit           = { workspace = true, optional = true }

# Upstream atomr-accel re-exports (gated on `accel` / `accel-patterns`).
# The umbrella trait surface ships in `atomr-accel`; the NVIDIA CUDA
# backend (DeviceActor, GpuDispatcher, etc.) lives in
# `atomr-accel-cuda` since the 0.3 split.
atomr-accel          = { workspace = true, optional = true }
atomr-accel-cuda     = { workspace = true, optional = true }
atomr-accel-patterns = { workspace = true, optional = true }
