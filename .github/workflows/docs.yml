name: Docs

# Build rustdoc for the workspace and deploy to GitHub Pages.

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-D warnings -D rustdoc::broken-intra-doc-links --cfg docsrs"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --workspace --no-deps
        run: cargo doc --workspace --no-deps
      - name: Generate index.html landing page
        run: |
          mkdir -p target/doc
          cat > target/doc/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=inference/index.html">
          <link rel="canonical" href="inference/index.html">
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
