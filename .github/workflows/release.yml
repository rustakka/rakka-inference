name: Release

# Releases are tagged from `main`. Push a tag matching `v*` (e.g.
# `v0.1.0`, `v1.0.0-rc.1`) to fire this pipeline. The bump-and-tag
# step is automated by `.github/workflows/version-bump.yml`.
#
# This workflow:
#   1. Runs the 1.0-rc gate (`cargo xtask verify`).
#   2. Builds release binaries (`atomr-infer` from `atomr-infer-cli`) for
#      Linux x86_64 + aarch64, macOS x86_64 + aarch64, Windows x86_64.
#   3. Builds Python wheels + sdist via maturin.
#   4. Creates the GitHub Release with the artifacts attached.
#   5. Publishes every allowlisted Rust crate to crates.io in
#      dependency order.
#   6. Publishes wheels + sdist to PyPI via OIDC trusted publishing.
#
# atomr-infer path-depends on the sibling atomr and atomr-accel
# workspaces. Every job that touches Cargo.toml checks all three out
# side-by-side under the runner's work directory.
#
# Allowlist:
#   The publish step honors a repo variable
#   `ATOMR_INFER_PUBLISH_ALLOWLIST` (space-separated crate names).
#   Default = the "publishable now" subset from
#   `cargo xtask release-checklist`. Set to the empty string to
#   publish every member crate in dep order.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "cargo publish + maturin upload with --dry-run; skip GitHub Release upload"
        required: false
        default: "true"
      skip_crates:
        description: "Skip the crates.io publish job"
        required: false
        default: "false"
      skip_python:
        description: "Skip the Python wheel build / PyPI publish jobs"
        required: false
        default: "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Default allowlist used when the repo variable is unset.
  # Order doesn't matter here (the publish loop walks a strict
  # dep-order list lower in the file); the allowlist only filters
  # which crates that loop actually publishes vs skips.
  DEFAULT_PUBLISH_ALLOWLIST: >-
    atomr-infer-core
    atomr-infer-runtime
    atomr-infer-remote-core
    atomr-infer-runtime-openai
    atomr-infer-runtime-anthropic
    atomr-infer-runtime-gemini
    atomr-infer-runtime-litellm

jobs:
  verify:
    name: Verify (1.0-rc gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: cargo xtask verify
        run: cargo xtask verify
        working-directory: atomr-infer

  build-binaries:
    name: Build binaries (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          # NOTE: aarch64-unknown-linux-gnu is intentionally not built —
          # the cross-rs Docker container only mounts the working
          # directory, so the path-dep on the sibling atomr and
          # atomr-accel workspaces (which live one level up) isn't
          # visible inside the container. ARM-Linux users build from
          # source. Same justification as the wheel matrix below.
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_ext: .exe
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: atomr-infer
          key: ${{ matrix.target }}
      - name: Install cross (Linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --locked
      - name: Build atomr-infer (atomr-infer-cli) — remote-only
        shell: bash
        working-directory: atomr-infer
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} \
              -p atomr-infer-cli --no-default-features --features remote-only
          else
            cargo build --release --target ${{ matrix.target }} \
              -p atomr-infer-cli --no-default-features --features remote-only
          fi
      - name: Stage artifacts (unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        working-directory: atomr-infer
        run: |
          set -euo pipefail
          stage="atomr-infer-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/atomr-infer" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          cp LICENSE "$stage/" 2>/dev/null || true
          cp RELEASING.md "$stage/" 2>/dev/null || true
          tar -czf "../${stage}.tar.gz" "$stage"
      - name: Stage artifacts (windows)
        if: matrix.archive_ext == 'zip'
        shell: bash
        working-directory: atomr-infer
        run: |
          set -euo pipefail
          stage="atomr-infer-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/atomr-infer${{ matrix.bin_ext }}" "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          cp LICENSE "$stage/" 2>/dev/null || true
          cp RELEASING.md "$stage/" 2>/dev/null || true
          7z a "../${stage}.zip" "$stage"
      - uses: actions/upload-artifact@v4
        with:
          name: atomr-infer-binaries-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  github-release:
    name: GitHub Release
    needs: [verify, build-binaries, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: atomr-infer
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate release notes
        id: notes
        working-directory: atomr-infer
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          prev=$(git tag --sort=-creatordate | grep -v "^${tag}$" | head -n1 || true)
          range="${prev:+$prev..}HEAD"
          {
            echo "## atomr-infer ${tag}"
            echo
            echo "### Changes"
            git log --no-merges --pretty=format:'- %s (%h)' "${range}"
            echo
            echo
            echo "### Crates"
            grep -E "atomr-infer[-a-z]* = \{ path" Cargo.toml | sed 's/^/- /' || true
            echo
            echo "### Binaries"
            ls ../artifacts | grep "atomr-infer-binaries-" | sed 's/^/- /' || true
            echo
            echo "### Python wheels"
            ls ../artifacts | grep "atomr-infer-wheels-" | sed 's/^/- /' || true
          } > ../RELEASE_NOTES.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: atomr-infer ${{ steps.notes.outputs.tag }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(steps.notes.outputs.tag, '-') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

  publish-crates:
    name: Publish to crates.io
    needs: [verify, github-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_crates != 'true'
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      ALLOWLIST: ${{ vars.ATOMR_INFER_PUBLISH_ALLOWLIST }}
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }

      # Walk every publishable crate in dep order. The allowlist (repo
      # variable) restricts which crates actually publish; others are
      # logged-and-skipped so the run stays observable. The
      # idempotent retry treats "already uploaded" as success so a
      # partial run can be safely re-tagged.
      - name: Publish allowlisted crates in dep order
        working-directory: atomr-infer
        run: |
          set -euo pipefail

          allowlist="${ALLOWLIST:-${DEFAULT_PUBLISH_ALLOWLIST}}"
          allowlist=$(printf '%s' "$allowlist" | tr -s '[:space:]' ' ' | sed 's/^ //;s/ $//')
          if [ -z "$allowlist" ]; then
            echo "(allowlist empty — publishing every member crate in dep order)"
          else
            echo "allowlist: $allowlist"
          fi

          in_allowlist() {
            local needle="$1"
            if [ -z "$allowlist" ]; then return 0; fi
            for c in $allowlist; do
              if [ "$c" = "$needle" ]; then return 0; fi
            done
            return 1
          }

          publish_one() {
            local crate=$1
            if ! in_allowlist "$crate"; then
              echo "SKIP $crate (not in allowlist)"
              return 0
            fi
            local attempt=1
            while true; do
              echo "==> publishing $crate (attempt $attempt)"
              local out
              if out=$(cargo publish -p "$crate" 2>&1); then
                printf '%s\n' "$out"
                # Throttle between successful new-crate publishes so
                # crates.io's "new crates per period" limit doesn't bite.
                sleep 30
                return 0
              fi
              printf '%s\n' "$out"
              if printf '%s' "$out" | grep -qE "already (uploaded|exists)"; then
                echo "    (already on crates.io — continuing)"
                return 0
              fi
              if printf '%s' "$out" | grep -qE "(429|Too Many Requests|rate.*limit)" && [ $attempt -lt 6 ]; then
                local delay=$((90 * attempt))
                echo "    (rate-limited — sleeping ${delay}s before retry)"
                sleep "$delay"
                attempt=$((attempt + 1))
                continue
              fi
              return 1
            done
          }

          # Strict dep order. A crate appears after every crate it
          # depends on. Adding a new crate? Slot it into the earliest
          # layer that has all its dependencies already published.
          # Names match Cargo.toml [package] name (atomr-infer-*
          # for the publishable subset; the GPU/local/python/rollup
          # crates still use the squat-blocked short names and are
          # gated out of the default allowlist until they're renamed).
          for crate in \
            atomr-infer-core \
            atomr-infer-runtime \
            atomr-infer-python-bridge \
            atomr-infer-remote-core \
            atomr-infer-runtime-openai \
            atomr-infer-runtime-anthropic \
            atomr-infer-runtime-gemini \
            atomr-infer-runtime-litellm \
            atomr-infer-runtime-vllm \
            atomr-infer-runtime-tensorrt \
            atomr-infer-runtime-ort \
            atomr-infer-runtime-candle \
            atomr-infer-runtime-cudarc \
            atomr-infer-runtime-mistralrs \
            atomr-infer-pipeline \
            atomr-infer-testkit \
            atomr-infer-cli \
            inference; do
            publish_one "$crate"
          done

  publish-crates-dry-run:
    name: Publish to crates.io (dry run)
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: Dry-run publish for the publishable subset
        working-directory: atomr-infer
        run: |
          for c in atomr-infer-core atomr-infer-runtime \
                   atomr-infer-remote-core \
                   atomr-infer-runtime-openai atomr-infer-runtime-anthropic \
                   atomr-infer-runtime-gemini atomr-infer-runtime-litellm; do
            echo "==> $c"
            cargo publish -p "$c" --dry-run --allow-dirty || true
          done

  # ------------------------------------------------------------------
  # Python wheels + sdist
  # ------------------------------------------------------------------
  # Build a per-platform wheel for each supported CPython interpreter,
  # an sdist for archs we don't cross-compile, and publish to PyPI on a
  # `v*` tag using OIDC trusted publishing. TestPyPI dry-run is
  # available via `workflow_dispatch` for vetting an upcoming release
  # without burning the production package version.
  build-wheels:
    name: Build wheels (${{ matrix.target }} / ${{ matrix.os }})
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc (x86_64). aarch64-linux is intentionally
          # skipped — same `ring`-via-`rustls`-via-`aws-lc-rs`
          # cross-compile blocker atomr hits; ARM users install from
          # sdist.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-target: x86_64
            manylinux: auto
          # Linux musl.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            python-target: x86_64
            manylinux: musllinux_1_2
          # macOS — universal2 yields a single wheel covering both
          # x86_64 and arm64.
          - os: macos-latest
            target: universal2-apple-darwin
            python-target: universal2
            manylinux: "off"
          # Windows.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-target: x64
            manylinux: "off"
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: atomr-infer
          target: ${{ matrix.python-target }}
          # One wheel per supported CPython ABI on this platform.
          # `python-extension` activates `pyo3/extension-module` per
          # crates/atomr-infer-py-bindings/Cargo.toml.
          args: --release --strip --out dist --interpreter "python3.10 python3.11 python3.12 python3.13"
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: atomr-infer-wheels-${{ matrix.target }}
          path: atomr-infer/dist/*.whl

  build-sdist:
    name: Build sdist (Python)
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: atomr-infer
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: atomr-infer-sdist
          path: atomr-infer/dist/*.tar.gz

  publish-pypi:
    name: Publish wheels + sdist to PyPI
    needs: [verify, build-wheels, build-sdist, github-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.skip_python != 'true'
    # Trusted publishing — configure on PyPI: pypi.org → manage project →
    # publishing → add GitHub publisher (owner: rustakka, repo:
    # atomr-infer, workflow: release.yml, environment: pypi).
    environment:
      name: pypi
      url: https://pypi.org/p/atomr-infer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          # Pull only the Python artifact buckets — binary tarballs
          # share the `.tar.gz` extension with the sdist but are not
          # valid PyPI uploads.
          pattern: "atomr-infer-{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          # If trusted publishing is not yet configured, set
          # `password: ${{ secrets.PYPI_API_TOKEN }}` instead.
          skip-existing: true

  publish-pypi-dry-run:
    name: PyPI dry-run (TestPyPI)
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && github.event.inputs.skip_python != 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/atomr-infer
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "atomr-infer-{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
