# PR + push gate.
#
# atomr-infer path-depends on the sibling atomr and atomr-accel
# workspaces. CI checks all three out side-by-side under the runner's
# work directory so the path-deps in Cargo.toml resolve.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all -- --check
        working-directory: atomr-infer

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: atomr-infer

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - run: cargo test --workspace
        working-directory: atomr-infer

  deny:
    name: cargo-deny (license + duplicate-version policy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny --all-features check
        working-directory: atomr-infer

  feature-matrix:
    name: feature-matrix (per-backend cargo check)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - openai
          - anthropic
          - gemini
          - litellm
          - vllm
          - tensorrt
          - ort
          - candle
          - cudarc
          - mistralrs
          - pipeline
          - testkit
          # Audio modality — TTS providers
          - tts-openai
          - tts-openai-realtime
          - tts-elevenlabs
          - tts-gemini-live
          - tts-piper
          - tts-kokoro
          - tts-xtts
          - tts-moss
          # Audio modality — STT providers
          - stt-openai
          - stt-whisper
          - stt-deepgram
          - stt-assemblyai
          # Audio modality — A2F (Linux x86_64 only — the matrix
          # runner image satisfies that gate, so include it here).
          - audio2face
          # Audio meta-aggregates
          - tts-all
          - stt-all
          - audio-all
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: cargo check -p atomr-infer --features ${{ matrix.feature }}
        run: cargo check -p atomr-infer --no-default-features --features ${{ matrix.feature }}
        working-directory: atomr-infer

  audit:
    name: audit (regression check vs baseline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: cargo xtask audit --check
        run: cargo xtask audit --check
        working-directory: atomr-infer

  rustdoc:
    name: rustdoc (broken-link gate)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings -D rustdoc::broken-intra-doc-links --cfg docsrs"
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: cargo doc --workspace --no-deps
        # Note: --all-features here would force the GPU feature graph.
        # We document the default-feature surface; per-runtime crates
        # carry their feature-gated bodies in the rendered output via
        # the `cfg(docsrs)` flag.
        run: cargo doc --workspace --no-deps
        working-directory: atomr-infer

  remote-only-invariant:
    name: remote-only invariant (no GPU deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: Build atomr-infer --features remote-only
        run: cargo build -p atomr-infer --no-default-features --features remote-only
        working-directory: atomr-infer
      - name: Assert zero GPU deps in dep graph
        working-directory: atomr-infer
        run: |
          set -euo pipefail
          tree=$(cargo tree -p atomr-infer --no-default-features --features remote-only)
          if printf '%s\n' "$tree" | grep -E 'cudarc|atomr-accel|candle|pyo3' ; then
            echo "::error::remote-only build leaked GPU dependencies (above)"
            exit 1
          fi
          echo "remote-only invariant holds: zero GPU deps in tree."

  test-audio-fakes:
    name: test-audio-fakes (audio dispatch integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: Install protoc (Audio2Face gRPC build dep)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: cargo xtask verify-audio
        run: cargo xtask verify-audio
        working-directory: atomr-infer

  demo:
    name: end-to-end demo (wiremock)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: cargo run --bin remote_only_demo
        run: cargo run --bin remote_only_demo
        working-directory: atomr-infer

  verify:
    name: verify (1.0-rc gate)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, audit, deny, remote-only-invariant, feature-matrix, test-audio-fakes]
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: cargo xtask verify
        run: cargo xtask verify
        working-directory: atomr-infer

  semver-checks:
    name: semver-checks (cargo-semver-checks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Warn-only on 0.x pre-1.0. Once any inference-* crate hits 1.0,
    # flip the repo variable ATOMR_INFER_WORKSPACE_VERSION to start
    # with `1.` and this job becomes a hard gate.
    continue-on-error: ${{ !startsWith(vars.ATOMR_INFER_WORKSPACE_VERSION || '0.', '1.') }}
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-infer
        uses: actions/checkout@v4
        with: { path: atomr-infer }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-infer }
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Check public-API SemVer for every publishable crate
        working-directory: atomr-infer
        run: |
          set -e
          fails=0
          # Only check the "publishable now" set from the release
          # checklist. Extend this list as the allowlist widens.
          for crate in atomr-infer-core \
                       atomr-infer-runtime \
                       atomr-infer-remote-core \
                       atomr-infer-runtime-openai \
                       atomr-infer-runtime-anthropic \
                       atomr-infer-runtime-gemini \
                       atomr-infer-runtime-litellm; do
            echo "==> $crate"
            cargo semver-checks check-release --package "$crate" || fails=$((fails+1))
          done
          if [ "$fails" -gt 0 ]; then
            echo "$fails crate(s) failed semver-checks"
            exit 1
          fi
